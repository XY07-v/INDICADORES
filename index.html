        const CFG = {'prospecciones': ['METAS PROSPECCIONES', 'PROSPECCIONES', 'EFE PROSPECCIONES'], 'leads': ['METAS LEADS', 'LEADS.LEADS', 'EFE LEADS'], 'food': ['METAS FOOD', 'SP. FOOD', 'EFE FOOD'], 'ingredientes': ['METAS INGREDIENTES', 'SP. INGREDIENTES', 'EFE INGREDIENTES'], 'competencia': ['METAS COMPETENCIA', 'SP. COMPETENCIA', 'EFE COMPETENCIA'], 'rutas': ['PUNTOS PROGRAMADOS REALES', 'POC VISITADOS', 'EFE RUTA'], 'Logueos': ['METAS LOGUEOS', 'LOGUEOS', 'EFE LOGUEOS']};
        
        function getColor(ef, av) {
            if(ef === -1 || ef >= av) return 'var(--green)';
            if(ef >= (av - 0.1)) return 'var(--yellow)';
            return 'var(--red)';
        }

        function up() {
            const fa = document.getElementById('fA').value, fm = document.getElementById('fM').value, 
                  fr = document.getElementById('fR').value, fn = document.getElementById('fN').value.toLowerCase();
            let filtered = data.filter(d => (fa==='all'||d['AÑO'].toString()===fa) && (fm==='all'||d['MES'].toString()===fm) && (fr==='all'||d['REGIONAL'].toString()===fr) && (d['NOMBRE COMPLETO'].toLowerCase().includes(fn)));
            if(filtered.length > 0) {
                let p = (filtered[0].AVANCE_REF * 100).toFixed(0);
                document.getElementById('progText').innerText = p + "%";
                document.getElementById('ring').style.background = `conic-gradient(var(--green) ${p}%, #eee 0%)`;
            }
            render(filtered);
        }

        function descargarCSV() {
            if(rawCSV.length === 0) return alert("No hay datos");
            const ws = XLSX.utils.json_to_sheet(rawCSV);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Data_Colaboradores.xlsx");
        }

        function render(list) {
            const head = document.getElementById('tableHead'), body = document.getElementById('tableBody');
            let activeCats = [];
            for(let c in CFG) if(list.some(r => r[CFG[c][2]] !== null)) activeCats.push(c);
            let avRef = list.length > 0 ? list[0].AVANCE_REF : 0;

            list.sort((a, b) => {
                let sumA = 0, countA = 0, sumB = 0, countB = 0;
                activeCats.forEach(c => {
                    let vA = a[CFG[c][2]], vB = b[CFG[c][2]];
                    if(vA !== null) { sumA += (vA === -1 ? 1.1 : vA); countA++; }
                    if(vB !== null) { sumB += (vB === -1 ? 1.1 : vB); countB++; }
                });
                return (sumB / (countB || 1)) - (sumA / (countA || 1));
            });

            let headHtml = '<tr><th>Colaborador</th>';
            activeCats.forEach(c => {
                // NUEVA LÓGICA AGREGADA: Suma de ejecutados / Suma de metas
                let totalMeta = 0, totalEjec = 0;
                list.forEach(r => {
                    let m = r[CFG[c][0]], e = r[CFG[c][1]], ef = r[CFG[c][2]];
                    if(ef !== null) {
                        if(ef === -1) { // Caso Chulo: Se asume cumplimiento total
                           totalMeta += (m || 1); totalEjec += (m || 1);
                        } else {
                           totalMeta += (m || 0); totalEjec += (e || 0);
                        }
                    }
                });
                let aggAvg = totalMeta > 0 ? (totalEjec / totalMeta) : 0;
                headHtml += `<th>${c} <span class="avg-head" style="color:${getColor(aggAvg, avRef)}">${(aggAvg * 100).toFixed(0)}%</span></th>`;
            });
            head.innerHTML = headHtml + '</tr>';

            body.innerHTML = list.map((r, idx) => `
                <tr>
                    <td><div class="user-cell"><span class="rank">#${idx+1}</span><img src="${r.FOTO}" class="avatar"><div class="name">${r['NOMBRE COMPLETO']}</div></div></td>
                    ${activeCats.map(c => {
                        let ef = r[CFG[c][2]], m = r[CFG[c][0]], e = r[CFG[c][1]];
                        if(ef === null) return '<td><span style="color:#eee">-</span></td>';
                        let color = getColor(ef, avRef), txt = ef === -1 ? '✔' : (ef*100).toFixed(0)+'%';
                        if(c === 'Logueos') return `<td><span class="efe-val" style="color:${color}">${txt}</span></td>`;
                        return `<td>${m||0} / ${e||0} <span class="efe-val" style="color:${color}">${txt}</span></td>`;
                    }).join('')}
                </tr>
            `).join('');
        }
        up();
    </script>
