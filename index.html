        .top-1 { background: linear-gradient(90deg, #fff9e6 0%, #ffffff 100%) !important; border-left: 4px solid #ffcc00 !important; }

        .top-3 { background: linear-gradient(90deg, #fdf2ec 0%, #ffffff 100%) !important; border-left: 4px solid #e67e22 !important; }
        .rank-badge { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-size: 10px; color: white; font-weight: 900; margin-right: 5px; }
        .badge-1 { background: #ffcc00; } .badge-2 { background: #adb5bd; } .badge-3 { background: #e67e22; }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; table-layout: fixed; }
        thead th { position: sticky; top: 65px; background: var(--bg); padding: 12px 8px; font-size: 10px; color: var(--gray); font-weight: 800; text-transform: uppercase; z-index: 1000; text-align: center; }
        th:first-child { text-align: left; padding-left: 20px; width: 280px; }
        tbody tr { background: white; }
        td { padding: 10px 8px; vertical-align: middle; text-align: center; border-top: 1px solid #f2f2f2; border-bottom: 1px solid #f2f2f2; font-size: 11px; }
        td:first-child { border-left: 1px solid #f2f2f2; border-top-left-radius: 12px; border-bottom-left-radius: 12px; padding-left: 15px; text-align: left; }
        td:last-child { border-right: 1px solid #f2f2f2; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .name { font-weight: 700; font-size: 12px; }
        .efe-val { font-weight: 800; }
        .avg-head { display: block; font-size: 13px; font-weight: 900; }
        .corte-hoy { background: white; padding: 6px 14px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .ring { position: relative; width: 36px; height: 36px; border-radius: 50%; background: conic-gradient(var(--green) 0%, #eee 0%); display: flex; align-items: center; justify-content: center; }
        .ring::after { content: ""; position: absolute; inset: 4px; background: white; border-radius: 50%; }

    </style>

ta","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"SALA DE VELACION VILLANUEVA","ID Punto de Venta":3598,"Fecha Visita":"2026-03-13 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"SAN AGUSTIN EVENTOS Y TURISMO SAS","ID Punto de Venta":3904,"Fecha Visita":"2026-03-19 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"SAZON MARIA","ID Punto de Venta":3775,"Fecha Visita":"2026-03-05 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"SUPERMERCADO PA MI GENTE","ID Punto de Venta":4016,"Fecha Visita":"2026-03-20 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"TRADICIONES CLINARIAS UNIVERSIDAD UNIREM","ID Punto de Venta":3729,"Fecha Visita":"2026-03-02 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"UNDERGROUND PUB","ID Punto de Venta":3902,"Fecha Visita":"2026-03-02 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":30,"Nombre completo":"YEPES BETANCUR SHIRLEY","Punto de Venta":"VI\u00d1A CAFE","ID Punto de Venta":3588,"Fecha Visita":"2026-03-27 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"}]; // DATA RESTAURADA DESDE EL CSV
        const CFG = {'prospecciones': ['METAS PROSPECCIONES', 'PROSPECCIONES', 'EFE PROSPECCIONES'], 'leads': ['METAS LEADS', 'LEADS.LEADS', 'EFE LEADS'], 'food': ['METAS FOOD', 'SP. FOOD', 'EFE FOOD'], 'ingredientes': ['METAS INGREDIENTES', 'SP. INGREDIENTES', 'EFE INGREDIENTES'], 'competencia': ['METAS COMPETENCIA', 'SP. COMPETENCIA', 'EFE COMPETENCIA'], 'rutas': ['PUNTOS PROGRAMADOS REALES', 'POC VISITADOS', 'EFE RUTA'], 'Logueos': ['METAS LOGUEOS', 'LOGUEOS', 'EFE LOGUEOS']};

        function initFilters() {
            const regs = [...new Set(data.map(d => d['REGIONAL']))].sort();
            const cargos = [...new Set(data.map(d => d['CARGO']))].sort();
            const meses = [...new Set(data.map(d => d['MES']))];
            
            fillSelect('fR', regs, 'Todas las Regionales');
            fillSelect('fC', cargos, 'Todos los Cargos');
            fillSelect('fM', meses, 'Todo el Año');
            up();
        }

        function fillSelect(id, list, def) {
            const s = document.getElementById(id);
            const currentVal = s.value;
            s.innerHTML = `<option value="all">${def}</option>` + list.map(i => `<option value="${i}">${i}</option>`).join('');
            if([...s.options].some(o => o.value === currentVal)) s.value = currentVal;
        }

        function syncFilters(trigger) {
            const fr = document.getElementById('fR').value;
            const fc = document.getElementById('fC').value;
            if(trigger === 'R') {
                const filteredCargos = [...new Set(data.filter(d => fr === 'all' || d['REGIONAL'] === fr).map(d => d['CARGO']))].sort();
                fillSelect('fC', filteredCargos, 'Todos los Cargos');
            } else if(trigger === 'C') {
                const filteredRegs = [...new Set(data.filter(d => fc === 'all' || d['CARGO'] === fc).map(d => d['REGIONAL']))].sort();
                fillSelect('fR', filteredRegs, 'Todas las Regionales');
            }
            up();
        }

        function getColor(ef, av) {
            if(ef === -1 || ef >= av) return 'var(--green)';
            if(ef >= (av - 0.1)) return 'var(--yellow)';
            return 'var(--red)';
        }

        function up() {
            const fr = document.getElementById('fR').value, fc = document.getElementById('fC').value,
                  fm = document.getElementById('fM').value, fn = document.getElementById('fN').value.toLowerCase();

            let filtered = data.filter(d => 
                (fr==='all'||d['REGIONAL']===fr) && (fc==='all'||d['CARGO']===fc) &&
                (fm==='all'||d['MES']===fm) && (d['NOMBRE COMPLETO'].toLowerCase().includes(fn))
            );

            if(filtered.length > 0) {
                let p = (filtered[0].AVANCE_REF * 100).toFixed(0);
                document.getElementById('progText').innerText = p + "%";
                document.getElementById('ring').style.background = `conic-gradient(var(--green) ${p}%, #eee 0%)`;
            }
            render(filtered);
        }

        function descargarDataOriginal() {
            if(rawCSV.length === 0) return alert("No se pudo cargar el archivo data.csv original");
            const ws = XLSX.utils.json_to_sheet(rawCSV);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Cumplimiento_Ruta");
            XLSX.writeFile(wb, "Data_Cumplimiento_Ruta.xlsx");
        }

        function render(list) {
            const head = document.getElementById('tableHead'), body = document.getElementById('tableBody');
            let activeCats = [];
            for(let c in CFG) if(list.some(r => r[CFG[c][2]] !== null)) activeCats.push(c);
            let avRef = list.length > 0 ? list[0].AVANCE_REF : 0;

            list.sort((a, b) => {
                let sumA = 0, countA = 0, sumB = 0, countB = 0;
                activeCats.forEach(c => {
                    let vA = a[CFG[c][2]], vB = b[CFG[c][2]];
                    if(vA !== null) { sumA += (vA === -1 ? 1.1 : vA); countA++; }
                    if(vB !== null) { sumB += (vB === -1 ? 1.1 : vB); countB++; }
                });
                return (sumB / (countB || 1)) - (sumA / (countA || 1));
            });

            let headHtml = '<tr><th>Colaborador</th>';
            activeCats.forEach(c => {
                let aggAvg = 0;
                if(c === 'Logueos') {
                    let v = list.filter(r => r[CFG[c][2]] !== null).map(r => r[CFG[c][2]]===-1?1:r[CFG[c][2]]);
                    aggAvg = v.length > 0 ? (v.reduce((a,b)=>a+b,0)/v.length) : 0;
                } else {
                    let tm = 0, te = 0;
                    list.forEach(r => {
                        let ef = r[CFG[c][2]], m = r[CFG[c][0]], e = r[CFG[c][1]];
                        if(ef !== null) { if(ef===-1){tm+=(m||1); te+=(m||1);} else {tm+=(m||0); te+=(e||0);} }
                    });
                    aggAvg = tm > 0 ? te/tm : 0;
                }
                headHtml += `<th>${c} <span class="avg-head" style="color:${getColor(aggAvg, avRef)}">${(aggAvg*100).toFixed(0)}%</span></th>`;
            });
            head.innerHTML = headHtml + '</tr>';

            body.innerHTML = list.map((r, idx) => {
                let topCls = idx === 0 ? 'top-1' : idx === 1 ? 'top-2' : idx === 2 ? 'top-3' : '';
                let badgeCls = idx < 3 ? `rank-badge badge-${idx+1}` : 'rank';
                return `
                <tr class="${topCls}">
                    <td>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="${badgeCls}">${idx+1}</span>
                            <img src="${r.FOTO}" class="avatar">
                            <div><div class="name">${r['NOMBRE COMPLETO']}</div><div style="font-size:9px; color:var(--gray)">${r['CARGO']}</div></div>
                        </div>
                    </td>
                    ${activeCats.map(c => {
                        let ef = r[CFG[c][2]], m = r[CFG[c][0]], e = r[CFG[c][1]];
                        if(ef === null) return '<td>-</td>';
                        let color = getColor(ef, avRef), txt = ef === -1 ? '✔' : (ef*100).toFixed(0)+'%';
                        return `<td>${c==='Logueos'?'':(m||0)+'/'+(e||0)} <span class="efe-val" style="color:${color}">${txt}</span></td>`;
                    }).join('')}
                </tr>`;
            }).join('');
        }
        initFilters();
    </script>
