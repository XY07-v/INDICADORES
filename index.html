ade.com\/docs\/media\/employees\/2026\/27\/thumb_16.jpeg?v=1774819679"},{"REGIONAL":"Antioquia - Costa","NOMBRE COMPLETO":"Montoya Buitrago Vanesa","N. DOCUMENTO":1234990099,"MES":"3","A\u00d1O":2026,"METAS INGREDIENTES":50.0,"SP. INGREDIENTES":10.0,"EFE INGREDIENTES":0.2,"METAS FOOD":50.0,"SP. FOOD":10.0,"EFE FOOD":0.2,"METAS COMPETENCIA":null,"SP. COMPETENCIA":null,"EFE COMPETENCIA":null,"METAS PROSPECCIONES":null,"PROSPECCIONES":null,"EFE PROSPECCIONES":null,"PUNTOS PROGRAMADOS":12,"POC VISITADOS":12.0,"PUNTOS RETIRADOS":null,"PUNTOS PROGRAMADOS REALES":null,"EFE RUTA":null,"METAS LEADS":null,"LEADS.LEADS":null,"EFE LEADS":null,"AVANCE_REF":0.9230769231,"FOTO":"https:\/\/powertrade.manpower-powertrade.com\/docs\/media\/employees\/2026\/27\/thumb_14.png?v=1774819679"}];
        const CFG = {'prospecciones': ['METAS PROSPECCIONES', 'PROSPECCIONES', 'EFE PROSPECCIONES'], 'leads': ['METAS LEADS', 'LEADS.LEADS', 'EFE LEADS'], 'food': ['METAS FOOD', 'SP. FOOD', 'EFE FOOD'], 'ingredientes': ['METAS INGREDIENTES', 'SP. INGREDIENTES', 'EFE INGREDIENTES'], 'competencia': ['METAS COMPETENCIA', 'SP. COMPETENCIA', 'EFE COMPETENCIA'], 'rutas': ['PUNTOS PROGRAMADOS REALES', 'POC VISITADOS', 'EFE RUTA']};

        function getColor(ef, av) {
            if(ef === -1) return 'var(--green)';
            if(ef >= av) return 'var(--green)';
            if(ef >= (av - 0.1)) return 'var(--yellow)';
            return 'var(--red)';
        }

        function up() {
            const fa = document.getElementById('fA').value, fm = document.getElementById('fM').value, fr = document.getElementById('fR').value;
            let filtered = data.filter(d => (fa==='all'||d['AÑO'].toString()===fa) && (fm==='all'||d['MES'].toString()===fm) && (fr==='all'||d['REGIONAL'].toString()===fr));
            if(filtered.length > 0) {
                let p = (filtered[0].AVANCE_REF * 100).toFixed(0);
                document.getElementById('progText').innerText = p + "%";
                document.getElementById('ring').style.background = `conic-gradient(var(--green) ${p}%, #eee 0%)`;
            }
            render(filtered);
        }

        function render(list) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            let activeCats = [];
            for(let c in CFG) {
                if(list.some(r => r[CFG[c][0]] !== null && r[CFG[c][0]] !== 0)) activeCats.push(c);
            }

            let avRef = list.length > 0 ? list[0].AVANCE_REF : 0;

            let headHtml = '<tr><th>Colaborador</th>';
            activeCats.forEach(c => {
                let vals = list.map(r => r[CFG[c][2]]).filter(v => v !== null && v !== -1);
                let rawAvg = vals.length > 0 ? (vals.reduce((a,b)=>a+b, 0) / vals.length) : 0;
                let colorHead = getColor(rawAvg, avRef);
                headHtml += `<th>${c} <span class="avg-head" style="color:${colorHead}">${(rawAvg * 100).toFixed(0)}%</span></th>`;
            });
            head.innerHTML = headHtml + '</tr>';

            list.sort((a,b) => {
                let sumA = 0, countA = 0, sumB = 0, countB = 0;
                activeCats.forEach(c => {
                    let valA = a[CFG[c][2]], valB = b[CFG[c][2]];
                    if(valA !== null) { sumA += (valA === -1 ? 1.2 : valA); countA++; }
                    if(valB !== null) { sumB += (valB === -1 ? 1.2 : valB); countB++; }
                });
                return (sumB/(countB||1)) - (sumA/(countA||1));
            });

            body.innerHTML = list.map((r, idx) => `
                <tr>
                    <td>
                        <div class="user-cell">
                            <span class="rank">#${idx+1}</span>
                            <div class="avatar-container"><img src="${r.FOTO}" class="avatar"></div>
                            <div class="name">${r['NOMBRE COMPLETO']}</div>
                        </div>
                    </td>
                    ${activeCats.map(c => {
                        let m = r[CFG[c][0]], e = r[CFG[c][1]], ef = r[CFG[c][2]];
                        if(m === null || m === 0) return '<td><span style="color:#eee">-</span></td>';
                        let color = getColor(ef, avRef);
                        let txt = ef === -1 ? '✔' : (ef*100).toFixed(0)+'%';
                        return `<td><span class="metric-line">${m} / ${e || 0} <span class="efe-val" style="color:${color}">${txt}</span></span></td>`;
                    }).join('')}
                </tr>
            `).join('');
        }
        up();
    </script>
