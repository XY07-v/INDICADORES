        :root { --bg: #f4f7fa; --blue: #007aff; --gray: #8e8e93; --green: #34c759; --yellow: #ffcc00; --red: #ff3b30; --border: #e5e5ea; }
        body { background: var(--bg); margin: 0; padding: 0; color: #1c1c1e; }
        .nav { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); padding: 0 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1001; height: 65px; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .filters { display: flex; gap: 8px; align-items: center; }

        .pill label { font-size: 7px; color: var(--gray); font-weight: 800; display: block; text-transform: uppercase; margin-bottom: 2px; }
        
        .ms-box { font-size: 11px; color: var(--blue); font-weight: 700; cursor: pointer; min-width: 100px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ms-dropdown { display: none; position: absolute; top: 110%; left: 0; background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 2000; width: 220px; padding: 12px; max-height: 350px; overflow-y: auto; }
        .ms-dropdown.show { display: block; }
        .ms-item { display: flex; align-items: center; gap: 10px; padding: 6px 4px; font-size: 11px; cursor: pointer; border-radius: 4px; transition: 0.1s; }
        .ms-item:hover { background: #f2f2f7; }
        .ms-item input { width: 14px; height: 14px; cursor: pointer; }
        .ms-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; }
        .btn-apply { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; }

        select, input[type="text"] { border: none; background: transparent; font-size: 11px; color: var(--blue); font-weight: 700; outline: none; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        
        .top-1 { background: linear-gradient(90deg, #fff9e6 0%, #ffffff 100%) !important; border-left: 4px solid #ffcc00 !important; }
        .rank-badge { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-size: 10px; color: white; font-weight: 900; margin-right: 5px; }
        .badge-1 { background: #ffcc00; } .badge-2 { background: #adb5bd; } .badge-3 { background: #e67e22; }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; table-layout: fixed; }
        thead th { position: sticky; top: 65px; background: var(--bg); padding: 12px 8px; font-size: 10px; color: var(--gray); font-weight: 800; text-transform: uppercase; z-index: 1000; text-align: center; }
        th:first-child { text-align: left; padding-left: 20px; width: 280px; }
        tbody tr { background: white; }
        td { padding: 10px 8px; vertical-align: middle; text-align: center; border-top: 1px solid #f2f2f2; border-bottom: 1px solid #f2f2f2; font-size: 11px; }
        td:first-child { border-left: 1px solid #f2f2f2; border-top-left-radius: 12px; border-bottom-left-radius: 12px; padding-left: 15px; text-align: left; }
        td:last-child { border-right: 1px solid #f2f2f2; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .name { font-weight: 700; font-size: 12px; }
        .efe-val { font-weight: 800; }
        .avg-head { display: block; font-size: 13px; margin-top: 2px; }
        .corte-hoy { background: white; padding: 6px 14px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .ring { position: relative; width: 36px; height: 36px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; }
        .ring::after { content: ""; position: absolute; inset: 4px; background: white; border-radius: 50%; }
        .ring-text { position: relative; font-size: 10px; font-weight: 900; z-index: 2; }
    </style>
</head>

00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"ANTIOQUIA - COSTA"},{"MES":3,"Nombre completo":"RESTREPO LUZ MARLENE","Punto de Venta":"ZUMOS SEDE NORTE","ID Punto de Venta":2099,"Fecha Visita":"2026-03-15 00:00:00","Fecha":null,"Cobertura Real":"Sin Visita","REGIONAL":"EJE - OCCIDENTE"}];
        const CFG = {'prospecciones': ['METAS PROSPECCIONES', 'PROSPECCIONES', 'EFE PROSPECCIONES'], 'leads': ['METAS LEADS', 'LEADS.LEADS', 'EFE LEADS'], 'food': ['METAS FOOD', 'SP. FOOD', 'EFE FOOD'], 'ingredientes': ['METAS INGREDIENTES', 'SP. INGREDIENTES', 'EFE INGREDIENTES'], 'competencia': ['METAS COMPETENCIA', 'SP. COMPETENCIA', 'EFE COMPETENCIA'], 'rutas': ['PUNTOS PROGRAMADOS', 'POC VISITADOS', 'EFE RUTA'], 'Logueos': ['METAS LOGUEOS', 'LOGUEOS', 'EFE LOGUEOS']};
        let currentAvRef = 0; 
        let selectedR = [], selectedC = [];

        function toggleD(id, e) { 
            closeDropdowns();
            document.getElementById(id).classList.toggle('show'); 
        }

        function closeDropdowns() { 
            document.querySelectorAll('.ms-dropdown').forEach(d => d.classList.remove('show')); 
        }

        function fillMulti(id, list) {
            const div = document.getElementById(id);
            div.innerHTML = list.map(item => `
                <div class="ms-item" onclick="this.querySelector('input').click()">
                    <input type="checkbox" value="${item}" onclick="event.stopPropagation()">
                    <span>${item}</span>
                </div>
            `).join('');
        }

        function updateMulti(type) {
            if(type === 'R') {
                selectedR = Array.from(document.querySelectorAll('#listR input:checked')).map(i => i.value);
                document.getElementById('labelR').innerText = selectedR.length ? (selectedR.length + " Seleccionadas") : 'Todas';
            } else {
                selectedC = Array.from(document.querySelectorAll('#listC input:checked')).map(i => i.value);
                document.getElementById('labelC').innerText = selectedC.length ? (selectedC.length + " Seleccionados") : 'Todos';
            }
            closeDropdowns();
            up();
        }

        function getAvanceDinamico(mesValue) {
            if (!mesValue || mesValue === 'all') return 0;
            const mesesMap = { 'enero':1,'febrero':2,'marzo':3,'abril':4,'mayo':5,'junio':6,'julio':7,'agosto':8,'septiembre':9,'octubre':10,'noviembre':11,'diciembre':12 };
            let numMesFiltro = parseInt(mesValue);
            if (isNaN(numMesFiltro)) numMesFiltro = mesesMap[mesValue.toLowerCase().trim()];
            const hoy = new Date(), mesActual = hoy.getMonth() + 1, diaActual = hoy.getDate(), año = hoy.getFullYear();
            if (numMesFiltro < mesActual) return 1; 
            if (numMesFiltro > mesActual) return 0;
            let totalH = 0, pasadosH = 0;
            const ultDia = new Date(año, numMesFiltro, 0).getDate();
            for(let d=1; d<=ultDia; d++) {
                let f = new Date(año, numMesFiltro-1, d);
                if(f.getDay() !== 0) { totalH++; if(d <= diaActual) pasadosH++; }
            }
            return totalH > 0 ? (pasadosH / totalH) : 0;
        }

        function initFilters() {
            const regs = [...new Set(data.map(d => d['REGIONAL']))].sort();
            const cargos = [...new Set(data.map(d => d['CARGO']))].sort();
            const meses = [...new Set(data.map(d => d['MES']))].sort((a,b) => (parseInt(a)||0) - (parseInt(b)||0));
            
            fillMulti('listR', regs);
            fillMulti('listC', cargos);
            
            const sm = document.getElementById('fM');
            sm.innerHTML = '<option value="all">Todo el Año</option>' + meses.map(m => `<option value="${m}">${m}</option>`).join('');
            up();
        }

        function getColor(ef, av) {
            if(ef === -1) return 'var(--green)';
            if(av <= 0) return ef >= 0.9 ? 'var(--green)' : (ef >= 0.8 ? 'var(--yellow)' : 'var(--red)');
            return ef >= av ? 'var(--green)' : (ef >= (av - 0.1) ? 'var(--yellow)' : 'var(--red)');
        }

        function up() {
            const fm = document.getElementById('fM').value, fn = document.getElementById('fN').value.toLowerCase();
            currentAvRef = getAvanceDinamico(fm);
            let p = (currentAvRef * 100).toFixed(0);
            document.getElementById('progText').innerText = (fm === 'all') ? "0%" : p + "%";
            document.getElementById('ring').style.background = (fm === 'all' || p == 0) ? "#eee" : `conic-gradient(var(--green) ${p}%, #eee 0%)`;

            let filtered = data.filter(d => 
                (selectedR.length === 0 || selectedR.includes(d['REGIONAL'])) &&
                (selectedC.length === 0 || selectedC.includes(d['CARGO'])) &&
                (fm==='all'||d['MES']===fm) && (d['NOMBRE COMPLETO'].toLowerCase().includes(fn))
            );
            render(filtered);
        }

        function render(list) {
            const head = document.getElementById('tableHead'), body = document.getElementById('tableBody');
            let activeCats = [];
            for(let c in CFG) if(list.some(r => r[CFG[c][2]] !== null)) activeCats.push(c);

            list.sort((a, b) => {
                let sA = 0, cA = 0, sB = 0, cB = 0;
                activeCats.forEach(c => {
                    let vA = a[CFG[c][2]], vB = b[CFG[c][2]];
                    if(vA !== null) { sA += (vA === -1 ? 1.1 : vA); cA++; }
                    if(vB !== null) { sB += (vB === -1 ? 1.1 : vB); cB++; }
                });
                return (sB / (cB || 1)) - (sA / (cA || 1));
            });

            let headH = '<tr><th>Colaborador</th>';
            activeCats.forEach(c => {
                let totalEf = 0, count = 0, sumaMetas = 0, sumaEfectivo = 0;
                list.forEach(r => {
                    let ef = r[CFG[c][2]], m = r[CFG[c][0]], e = r[CFG[c][1]];
                    if(ef !== null) {
                        count++;
                        if(c === 'Logueos') totalEf += (ef === -1 ? 1 : ef);
                        else {
                            if(ef === -1) { sumaMetas += (m || 1); sumaEfectivo += (m || 1); }
                            else { sumaMetas += (m || 0); sumaEfectivo += (e || 0); }
                        }
                    }
                });
                let promedioCat = (c === 'Logueos') ? (count > 0 ? totalEf / count : 0) : (sumaMetas > 0 ? sumaEfectivo / sumaMetas : 0);
                headH += `<th>${c} <span class="avg-head" style="color:${getColor(promedioCat, currentAvRef)}">${(promedioCat*100).toFixed(0)}%</span></th>`;
            });
            head.innerHTML = headH + '</tr>';

            body.innerHTML = list.map((r, i) => `
                <tr class="${i===0?'top-1':''}">
                    <td>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="${i<3?'rank-badge badge-'+(i+1):'rank'}">${i+1}</span>
                            <img src="${r.FOTO}" class="avatar">
                            <div><div class="name">${r['NOMBRE COMPLETO']}</div><div style="font-size:9px; color:var(--gray)">${r['CARGO']}</div></div>
                        </div>
                    </td>
                    ${activeCats.map(c => {
                        let ef = r[CFG[c][2]], m = r[CFG[c][0]], e = r[CFG[c][1]];
                        if(ef === null || ef === undefined) return '<td>-</td>';
                        let color = getColor(ef, currentAvRef), txt = ef === -1 ? '✔' : (ef*100).toFixed(0)+'%';
                        let valDisplay = (c === 'Logueos') ? '' : (m||0)+'/'+(e||0);
                        if (c === 'Rutas') valDisplay = (e||0)+'/'+(m||0); 
                        return `<td>${valDisplay} <span class="efe-val" style="color:${color}">${txt}</span></td>`;
                    }).join('')}
                </tr>`).join('');
        }

        function descargarDataOriginal() {
            if(rawCSV.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(rawCSV);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Data_Cumplimiento.xlsx");
        }

        initFilters();
    </script>
