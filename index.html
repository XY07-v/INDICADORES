        const b = document.createElement('button');

    document.getElementById('f-reg').innerHTML = '<option value="todos">Regional</option>' + [...regs].sort().map(r=>`<option value="${r}">${r}</option>`).join('');
    
    const mesesMetas = {10:"Enero",20:"Febrero",30:"Marzo",40:"Abril",50:"Mayo",60:"Junio",70:"Julio",80:"Agosto",90:"Septiembre",100:"Octubre",110:"Noviembre",120:"Diciembre"};
    document.getElementById('f-mes').innerHTML = '<option value="todos">Mes</option>' + Object.keys(mesesMetas).map(m=>`<option value="${m}">${mesesMetas[m]}</option>`).join('');
    
    updateSelectors(); render();
}

function updateSelectors() {
    const d = DATA[reporteActual];
    document.getElementById('f-comunes').style.display = d.tipo === "metas" ? "flex" : "none";
    document.getElementById('f-especificos-logueos').style.display = d.tipo === "logueos" ? "flex" : "none";
    document.getElementById('f-especificos-rutas').style.display = d.tipo === "tabla_indep" ? "flex" : "none";
    if(d.tipo === "logueos") updateLogFilters(true);
    if(d.tipo === "tabla_indep") updateRutasFilters(true);
}

function updateLogFilters(reset = false) {
    const d = DATA.logueos.data;
    const sNom = document.getElementById('f-log-nom'), sMes = document.getElementById('f-log-mes'), sNov = document.getElementById('f-log-nov');
    if(reset) {
        sNom.innerHTML = '<option value="todos">Asesor</option>' + [...new Set(d.map(x=>x['Nombre completo']))].sort().map(n=>`<option value="${n}">${n}</option>`).join('');
        sMes.innerHTML = '<option value="todos">Mes</option>' + [...new Set(d.map(x=>x['MES_NOM']))].sort().map(m=>`<option value="${m}">${m}</option>`).join('');
    }
    const dataF = d.filter(x => (sNom.value === "todos" || x['Nombre completo'] === sNom.value) && (sMes.value === "todos" || x['MES_NOM'] === sMes.value));
    const uNov = [...new Set(dataF.map(x=>x['Novedad']))].sort();
    const curNov = sNov.value;
    sNov.innerHTML = '<option value="todos">Novedad</option>' + uNov.map(n=>`<option value="${n}">${n}</option>`).join('');
    if([...sNov.options].some(o => o.value === curNov)) sNov.value = curNov;
    const dataF2 = dataF.filter(x => sNov.value === "todos" || x['Novedad'] === sNov.value);
    const fechas = [...new Set(dataF2.map(x => x['Fecha']))].sort();
    document.getElementById('f-log-fec-multi').innerHTML = fechas.map(f => `<label style="display:block; font-size:8px;"><input type="checkbox" value="${f}" onchange="render()" checked> ${f}</label>`).join('');
}

function updateRutasFilters(reset = false) {
    const d = DATA.detalle_rutas;
    const sNom = document.getElementById('f-nom-ruta'), sMes = document.getElementById('f-mes-ruta'), sCob = document.getElementById('f-cob-ruta');
    if(reset) {
        sNom.innerHTML = '<option value="todos">Asesor</option>' + [...new Set(d.data.map(x=>x['Nombre completo']))].sort().map(n=>`<option value="${n}">${n}</option>`).join('');
        sMes.innerHTML = '<option value="todos">Mes</option>' + [...new Set(d.data.map(x=>x[d.col_mes_ref]))].sort().map(m=>`<option value="${m}">${m}</option>`).join('');
    }
    const dataF = d.data.filter(x => (sNom.value === "todos" || x['Nombre completo'] === sNom.value) && (sMes.value === "todos" || String(x[d.col_mes_ref]) === sMes.value));
    const cobU = [...new Set(dataF.map(x => x['Cobertura Real']))].sort();
    sCob.innerHTML = '<option value="todos">Cobertura</option>' + cobU.map(c => `<option value="${c}">${c}</option>`).join('');
}

function render() {
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + reporteActual).classList.add('active');
    const d = DATA[reporteActual];
    
    const f=new Date(), y=f.getFullYear(), m=f.getMonth(), day=f.getDate(), u=new Date(y, m+1, 0).getDate();
    let t_d=0, h_d=0; for(let i=1; i<=u; i++) { if(new Date(y, m, i).getDay()!==0) { t_d++; if(i<=day) h_d++; } }
    const avanceHoy = (h_d/t_d)*100;
    document.getElementById('avance-hoy').innerText = avanceHoy.toFixed(1) + "%";
    
    document.getElementById('vista-indicadores').style.display = d.tipo === "metas" ? "flex" : "none";
    document.getElementById('vista-logueos').style.display = d.tipo === "logueos" ? "block" : "none";
    document.getElementById('vista-rutas').style.display = d.tipo === "tabla_indep" ? "block" : "none";
    
    if(d.tipo === "metas") {
        let regV = document.getElementById('f-reg').value, mesV = document.getElementById('f-mes').value;
        const filt = x => (regV==="todos" || String(x.REGIONAL)===regV) && (mesV==="todos" || String(x.MES)===mesV);
        const proc = (list, mC, rC) => list.filter(filt).map(r => ({...r, _c: (r[rC]/r[mC]*100)||0})).sort((a,b)=>b._c - a._c);
        const getCol = (v) => v >= avanceHoy ? 'txt-ok' : (v >= avanceHoy-10 ? '' : 'txt-alerta');
        document.getElementById('body-asesores').innerHTML = proc(d.asesores, d.meta_col, d.real_col).map(r => `<tr><td>${r['NOMBRE COMPLETO']}</td><td>${Math.round(r[d.meta_col])}</td><td>${Math.round(r[d.real_col])}</td><td class="${getCol(r._c)}">${r._c.toFixed(1)}%</td></tr>`).join('');
        document.getElementById('body-regionales').innerHTML = proc(d.regionales, d.meta_col, d.real_col).map(r => `<tr><td>${r['REGIONAL']}</td><td>${Math.round(r[d.meta_col])}</td><td>${Math.round(r[d.real_col])}</td><td class="${getCol(r._c)}">${r._c.toFixed(1)}%</td></tr>`).join('');
    
    } else if(d.tipo === "logueos") {
        const nV = document.getElementById('f-log-nom').value, mesV = document.getElementById('f-log-mes').value, novV = document.getElementById('f-log-nov').value;
        const fecsSel = [...document.querySelectorAll('#f-log-fec-multi input:checked')].map(i => i.value);
        // ORDENADO DE MENOR A MAYOR CUMPLIMIENTO
        const logs = d.data.filter(x => (nV==="todos" || x['Nombre completo']===nV) && (mesV==="todos" || x['MES_NOM']===mesV) && (novV==="todos" || x['Novedad']===novV) && (fecsSel.includes(x['Fecha']))).sort((a,b) => a.Cumplimiento_Num - b.Cumplimiento_Num);
        
        document.getElementById('h-logueos').innerHTML = d.columnas.map(c => `<th>${c}</th>`).join('');
        document.getElementById('body-logueos').innerHTML = logs.map(r => {
            let clFila = r['Nota'] === 'No laboro' ? 'fila-no-laboro' : '';
            return `<tr class="${clFila}">${d.columnas.map(c => {
                if(c === 'Imagen Check In') return `<td><img src="${r[c]}" class="img-check" onclick="window.open(this.src)" onerror="this.style.display='none'"></td>`;
                if(c === 'Cumplimiento') return `<td class="${r.Cumplimiento_Num >= avanceHoy ? 'txt-ok' : 'txt-alerta'}">${r[c]}</td>`;
                return `<td>${r[c]}</td>`;
            }).join('')}</tr>`;
        }).join('');
    
    } else if(d.tipo === "tabla_indep") {
        const nV = document.getElementById('f-nom-ruta').value, mV = document.getElementById('f-mes-ruta').value, cV = document.getElementById('f-cob-ruta').value;
        const dataF = d.data.filter(x => (nV==="todos" || x['Nombre completo']===nV) && (mV==="todos" || String(x[d.col_mes_ref])===mV) && (cV==="todos" || x['Cobertura Real']===cV));
        document.getElementById('h-rutas').innerHTML = d.columnas.map(c => `<th>${c}</th>`).join('');
        document.getElementById('b-rutas').innerHTML = dataF.map(r => {
            let cl = r['Cobertura Real'] === 'En Ruta' ? 'txt-ok' : (r['Cobertura Real'] === 'Sin Visita' ? 'txt-alerta' : '');
            return `<tr>${d.columnas.map(c => `<td class="${c==='Cobertura Real'?cl:''}">${r[c]}</td>`).join('')}</tr>`;
        }).join('');
    }
}
window.onload = init;
</script></body></html>
